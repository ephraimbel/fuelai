name: Fuel
options:
  bundleIdPrefix: com.fuelai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift.git
    from: "2.0.0"

targets:
  Fuel:
    type: application
    platform: iOS
    sources:
      - path: Fuel
    resources:
      - path: Fuel/Assets.xcassets
      - path: Fuel/Resources/expanded_foods.json
    settings:
      base:
        INFOPLIST_FILE: Fuel/Info.plist
        DEVELOPMENT_TEAM: LRDHWBMA87
        PRODUCT_BUNDLE_IDENTIFIER: com.fuelai.app
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: Fuel/Fuel.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
